<!DOCTYPE html>

<html>
<head>
    <title>Movie Recommender</title>

```
<style>
    body {
        background-color: #141414;
        color: white;
        font-family: Arial;
        text-align: center;
    }

    h1 {
        color: red;
    }

    /* 🔥 Search container */
    .search-box {
        position: relative;
        width: 400px;
        margin: auto;
    }

    .search-form {
        display: flex;
        gap: 10px;
    }

    .search-form input {
        flex: 1;
        padding: 10px;
        border-radius: 5px;
        border: none;
    }

    .search-form button {
        padding: 10px 15px;
        background-color: red;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    /* 🔥 Netflix suggestions */
    #suggestions {
        position: absolute;
        top: 45px;
        width: 100%;
        background: #222;
        border-radius: 5px;
        z-index: 1000;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .suggestion-item {
        display: flex;
        align-items: center;
        padding: 8px;
        cursor: pointer;
    }

    .suggestion-item img {
        width: 40px;
        margin-right: 10px;
        border-radius: 3px;
    }

    .suggestion-item:hover {
        background: #444;
    }

    /* 🔥 Movie cards */
    .movies-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
    }

    .movie-card {
        width: 150px;
        transition: transform 0.3s;
    }

    .movie-card img {
        width: 100%;
        border-radius: 10px;
    }

    .movie-card:hover {
        transform: scale(1.1);
    }
</style>
```

</head>

<body>

<h1>🎬 Movie Recommender</h1>

<div class="search-box">
    <form action="/recommend" method="post" class="search-form">
        <input type="text" id="movieInput" name="movie" placeholder="Search movie..." onkeyup="suggestMovies()">
        <button type="submit">Recommend</button>
    </form>

```
<div id="suggestions"></div>
```

</div>

{% if movies %} <h2>Recommended Movies</h2>

```
<div class="movies-container">
    {% for i in range(movies|length) %}
        <div class="movie-card">
            <img src="{{ posters[i] }}">
            <p>{{ movies[i] }}</p>
        </div>
    {% endfor %}
</div>
```

{% endif %}

<script>
function suggestMovies() {
    let query = document.getElementById("movieInput").value;

    if (query.length === 0) {
        document.getElementById("suggestions").innerHTML = "";
        return;
    }

    fetch(`/suggest?query=${query}`)
        .then(res => res.json())
        .then(data => {
            let box = document.getElementById("suggestions");
            box.innerHTML = "";

            data.forEach(movie => {
                let div = document.createElement("div");
                div.className = "suggestion-item";

                div.innerHTML = `
                    <img src="${movie.poster}">
                    <span>${movie.title}</span>
                `;

                div.onclick = function() {
                    document.getElementById("movieInput").value = movie.title;
                    box.innerHTML = "";
                };

                box.appendChild(div);
            });
        });
}
</script>

</body>
</html>
